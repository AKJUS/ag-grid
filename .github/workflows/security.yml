name: Security

on:
    workflow_dispatch:
      inputs:
        notify:
          description: 'Notify Slack channel'
          type: boolean
          default: false
          required: true
        force_jira_ticket:
          description: 'Force create a Jira ticket even if the run is not scheduled'
          type: boolean
          default: false
          required: true
    schedule:
        - cron: '0 0 * * *' # Run daily at midnight UTC

permissions:
  contents: read

env:
  CTRF_FILE: ./test-results/report.json
  PREV_COMMIT_SHA_FILE: ./commit-sha.txt
  REPO_URL: ${{ github.server_url }}/${{ github.repository }}

jobs:
    code-dependency-scan:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              id: checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 1
            - name: Snyk scan workspaces
              id: snyk-scan-workspaces
              uses: ./external/ag-shared/github/actions/snyk-scan-workspaces
              with:
                  snyk_token: ${{ secrets.SNYK_TOKEN }}
                  remote_repo_url: ${{env.REPO_URL}}
                  ctrf_file: ${{ env.CTRF_FILE }}

            - name: Persist scan results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                name: snyk-scan-workspaces
                path: test-results/

    sast-code-scan:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              id: checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 1
            - name: Snyk code scan
              id: snyk-code-scan
              uses: ./external/ag-shared/github/actions/snyk-code-scan
              with:
                  snyk_token: ${{ secrets.SNYK_TOKEN }}
                  ctrf_file: ${{ env.CTRF_FILE }}

            - name: Persist scan results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                name: snyk-code-scan
                path: test-results/

    combine-scan-results:
      needs: [code-dependency-scan, sast-code-scan]
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
          with:
            fetch-depth: 1

        - uses: actions/download-artifact@v4
          with:
            path: test-results/

        - name: Combine reports
          uses: actions/github-script@v7
          if: ${{ github.event_name == 'schedule' || inputs.notify }}
          with:
            script: |
              const fs = require('fs');
              const path = require('path');
              // read all json files nested under /test-results/**/*.json 
              const files = fs.readdirSync('test-results', { withFileTypes: true })
                .flatMap(dir => {
                  if (dir.isDirectory()) {
                    return fs.readdirSync(path.join('test-results', dir.name))
                      .filter(file => file.endsWith('.json'))
                      .map(file => path.join('test-results', dir.name, file));
                  } 
                  if (dir.isFile() && dir.name.endsWith('.json')) {
                    return [path.join('test-results', dir.name)];
                  }
                  return [];
                });
              const report = { results: { summary: { failed: 0, passed: 0, skipped: 0 } } };
              for (const file of files) {
                  if (fs.existsSync(file)) {
                    const data = JSON.parse(fs.readFileSync(file, 'utf8'));
                    report.results.summary.failed += data.results.summary.failed || 0;
                    report.results.summary.passed += data.results.summary.passed || 0;
                    report.results.summary.skipped += data.results.summary.skipped || 0;
                  }
              }
          
              fs.mkdirSync(path.dirname(path.join('.', '${{ env.CTRF_FILE }}')), { recursive: true });
              fs.writeFileSync(path.join('.', '${{ env.CTRF_FILE }}'), JSON.stringify(report));

        - name: Get previous run commit SHA
          id: prev-commit-sha
          uses: actions/cache/restore@v4
          with:
            restore-keys: |
              security-prev-commit-
              security-prev-commit-${{ github.ref }}
            path: ${{ env.PREV_COMMIT_SHA_FILE }}
            key: security-prev-commit-${{ github.ref }}-${{ github.sha }}

        - name: Load files into environment
          continue-on-error: true
          run: |
            if [ -f ${{ env.PREV_COMMIT_SHA_FILE }} ]; then
            {
               echo 'PREV_COMMIT_SHA<<EOF'
               cat ${{ env.PREV_COMMIT_SHA_FILE }}
               echo 'EOF'
            } >> $GITHUB_ENV
            else
              echo 'PREV_COMMIT_SHA_FILE not found'
            fi

        - name: Slack Notification
          if: ${{ github.event_name == 'schedule' || inputs.notify }}
          continue-on-error: true
          uses: ./.github/actions/slack-integration
          with:
            CTRF_REPORT_FILE: ${{ env.CTRF_FILE }}
            SLACK_WEBHOOK: ${{ secrets.CI_GATE_WEBHOOK }}
            PREV_COMMIT_SHA: ${{ env.PREV_COMMIT_SHA }}
            CURRENT_COMMIT_SHA: ${{ github.sha }}
            IS_SUCCESS: ${{ needs.code-dependency-scan.result != 'failure' && needs.sast-code-scan.result != 'failure' }}

        - name: Create Jira Ticket
          uses: ./.github/actions/jira-integration
          continue-on-error: true
          if: ${{ github.event_name == 'schedule' || inputs.force_jira_ticket }}
          with:
            JIRA_API_AUTH: ${{ secrets.JIRA_API_AUTH }}
            JIRA_SUMMARY: "[NR] CI/CD workflow '${{ github.workflow }}' is failing."
            CTRF_REPORT_FILE: ${{ env.CTRF_FILE }}
            IS_SUCCESS: ${{ needs.code-dependency-scan.result != 'failure' && needs.sast-code-scan.result != 'failure' }}
            PREV_COMMIT_SHA: ${{ env.PREV_COMMIT_SHA }}
            CURRENT_COMMIT_SHA: ${{ github.sha }}

        - name: Set commit SHA
          id: set-commit-sha
          run: echo ${{ github.sha }} > ${{ env.PREV_COMMIT_SHA_FILE }}

        - name: Save Current Commit Hash
          uses: actions/cache/save@v4
          with:
            path: ${{ env.PREV_COMMIT_SHA_FILE }}
            key: ${{ steps.prev-commit-sha.outputs.cache-primary-key }}
