name: Update JIRA Ticket on PR Merge

on:
  pull_request:
    types: [ closed ]
  workflow_dispatch:
    inputs:
      debug_pr_id:
        description: 'PR id to work with (used for debugging this workflow)'
        type: number
        required: false
      debug_jira_ticket:
        description: 'JIRA ticket to update (used for debugging this workflow)'
        type: string
        default: ''
        required: false

permissions:
  contents: read

jobs:
  move-jira:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          sparse-checkout:
            'scripts/ci/_utils.mjs'
      - name: Check if PR is merged
        uses: actions/github-script@v7
        continue-on-error: true
        env:
          PR_ID: ${{ github.event.inputs.debug_pr_id || github.event.pull_request.number }}
          DEBUG_JIRA_TICKET: ${{ github.event.inputs.debug_jira_ticket }}
          JIRA_API_AUTH: ${{ secrets.JIRA_API_AUTH }}
        with:
          result-encoding: string
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr_number = process.env.PR_ID || '';
            if (!pr_number && !process.env.DEBUG_JIRA_TICKET) {
              throw new Error('Must provide a PR ID or a JIRA ticket.');
            }
            let issueKey = process.env.DEBUG_JIRA_TICKET || '';
            if (!issueKey) {
              const pr = context.payload.pull_request || await github.rest.pulls.get({
                owner,
                repo,
                pull_number: pr_number
              });
              const is_merged = !!pr.merged_at;
              if (!is_merged) {
                console.log(`PR #${pr_number} is not merged, skipping JIRA ticket update.`);
                return;
              }
              const prefixes = ['fix', 'fix', 'close', 'resolve'];
              const regex = new RegExp(`(${prefixes.join('|')})\\w*\\s*\\[?((AG|RTI)-[\\d]{3,})`, 'i');
              const matches = pr.body.match(regex);
              if (matches) {
                issueKey = matches[2];
              }
            }
            if (!issueKey) {
              throw new Error('No JIRA ticket found in PR body.');
            }
            const utils = require('./scripts/ci/_utils.mjs');
            const transitions = {
              131: 'QA',
              3: 'REVIEWED',
            };
            // Move the JIRA ticket to 'the next column' if the PR is merged
            const availableTransitions = await utils.getTransitions(issueKey);
            if (!availableTransitions || availableTransitions.length === 0) {
              throw new Error(`No available transitions found for JIRA ticket ${issueKey}.`);
            }
            const nextTransition = Object
              .keys(transitions)
              .find(key => availableTransitions
                .find(tr => 
                  tr.id === key &&
                  tr.name.toLowerCase() === transitions[key].toLowerCase()
                )
              );
            const issue = await utils.getIssue(issueKey);
            await utils.transitionIssue(issue, nextTransition);
            if (pr_number) {
              await github.rest.issues.createComment({
                issue_number: pr_number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `Transitioned JIRA ticket ${issueKey} to ${transitions[nextTransition]}.`
              });
            }
