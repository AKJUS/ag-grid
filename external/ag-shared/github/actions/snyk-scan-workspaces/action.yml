name: snyk-scan-workspaces

inputs:
    snyk_token:
        description: 'Snyk token to use.'
        required: true
    exclude:
        description: 'Packages to exclude from scans'
        # Ignore `project.json` as snyk thinks it is a dot net project
        default: '.nx,project.json,dist'
    severity_threshold:
        description: 'Severity threshold of the snyk scan'
        default: 'high'
    remote_repo_url:
        description: 'Public remote repository url'
        required: true
    report_file:
        description: 'Output file in CTRF format'
        default: 'report.json'
    output_dir:
        description: 'Output folder'
        default: 'test-results/'
    snyk_file:
        description: 'Snyk output json file'
        default: 'snyk.json'

runs:
    using: 'composite'
    steps:
        - name: Create output directory if required
          uses: actions/github-script@v7
          env:
              OUTPUT_DIR: ${{ inputs.output_dir }}
          with:
              script: |
                  const fs = require('fs');
                  fs.mkdirSync('${{ env.OUTPUT_DIR }}', { recursive: true });
        - name: Run snyk to check for vulnerabilities on all yarn workspaces
          uses: snyk/actions/node@master
          env:
              SNYK_TOKEN: ${{ inputs.snyk_token }}
          with:
              args: --yarn-workspaces --dev --strict-out-of-sync=false --severity-threshold=${{ inputs.severity_threshold }} --exclude=${{ inputs.exclude }} --remote-repo-url=${{ inputs.remote_repo_url }} --json > ${{ inputs.output_dir }}${{ inputs.snyk_file }}

        - name: To report CTRF format
          uses: actions/github-script@v7
          if: ${{ inputs.report_file != '' }}
          env:
              REPORT_FILE: ${{ inputs.report_file }}
              OUTPUT_DIR: ${{ inputs.output_dir }}
              SEVERITY_THRESHOLD: ${{ inputs.severity_threshold }}
          with:
              script: |
                  const fs = require('fs');
                  const path = require('path');
                  const file = '${{ inputs.output_dir }}${{ inputs.snyk_file }}';
                  const combinedResults = [];

                  if (fs.existsSync(file)) {
                    combinedResults.push(...JSON.parse(fs.readFileSync(file, 'utf8')));
                  }

                  const passed = combinedResults.filter(project => project.ok).length;
                  const vulnerabilities = combinedResults.flatMap(project => project.vulnerabilities);

                  const report = {
                    results: { summary: { failed: vulnerabilities.length, passed, skipped: 0 } }
                  }
                  fs.writeFileSync(path.join('${{ env.OUTPUT_DIR }}', '${{ env.REPORT_FILE }}'), JSON.stringify(report));
