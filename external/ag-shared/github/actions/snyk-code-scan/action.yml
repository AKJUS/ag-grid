name: snyk-code-scan

inputs:
    snyk_token:
        description: 'Snyk token to use.'
        required: true
    severity_threshold:
        description: 'Severity threshold of the snyk scan'
        default: 'high'
    report_file:
        description: 'Path to the output file in CTRF format'
        default: 'report.json'
    output_dir:
        description: 'Output folder'
        default: 'test-results/'
    snyk_file:
        description: 'Snyk output json file'
        default: 'snyk.json'

runs:
    using: 'composite'
    steps:
        - name: Create output directory if required
          uses: actions/github-script@v7
          env:
              OUTPUT_DIR: ${{ inputs.output_dir }}
          with:
              script: |
                  const fs = require('fs');
                  fs.mkdirSync('${{ env.OUTPUT_DIR }}', { recursive: true });
        - name: Run Snyk SAST security code scan
          uses: snyk/actions/node@master
          env:
              SNYK_TOKEN: ${{ inputs.snyk_token }}
          with:
              command: code test
              args: --severity-threshold=${{ inputs.severity_threshold }} --json > ${{ inputs.output_dir }}${{ inputs.snyk_file }}

        - name: To CTRF format
          uses: actions/github-script@v7
          if: ${{ inputs.report_file != '' }}
          env:
              REPORT_FILE: ${{ inputs.report_file }}
              OUTPUT_DIR: ${{ inputs.output_dir }}
              SEVERITY_THRESHOLD: ${{ inputs.severity_threshold }}
          with:
              script: |
                  const fs = require('fs');
                  const path = require('path');
                  const file = '${{ inputs.output_dir }}${{ inputs.snyk_file }}';

                  let combinedResults = {};

                  if (fs.existsSync(file)) {
                    combinedResults = JSON.parse(fs.readFileSync(file, 'utf8'));
                  }

                  const passed = combinedResults.runs.reduce((mem, run) =>
                    mem + run.properties.coverage.reduce((mem2, cov) =>
                      mem2 + (cov.isSupported ? cov.files : 0),
                    0),
                  0);
                  const failed = combinedResults.runs.reduce((mem, run) => mem + run.results.length, 0)
                  const skipped = combinedResults.runs.reduce((mem, run) =>
                    mem + run.properties.coverage.reduce((mem2, cov) =>
                      mem2 + (cov.isSupported ? 0 : cov.files),
                    0),
                  0);

                  const report = { results: { summary: { failed, passed, skipped } } };
                  fs.writeFileSync(path.join('${{ env.OUTPUT_DIR }}', '${{ env.REPORT_FILE }}'), JSON.stringify(report));
